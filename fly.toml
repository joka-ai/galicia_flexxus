app = "galicia-flexxus"
primary_region = "gru"

[build]

[env]
  PORT = "8080"
  HEADLESS = "true"
  SERVER_MODE = "true"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
